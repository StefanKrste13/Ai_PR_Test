name: AI PR Review (Ollama)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

      - name: Create payload
        run: |
          python3 - << 'EOF'
          import json

          diff = open("diff.txt", "r", errors="ignore").read()

          payload = {
              "model": "qwen3.5:35b",
              "stream": False,
              "options": {
                  "num_predict": 512
              },
              "prompt": "Review this PR:\n\n" + diff
          }

          with open("payload.json", "w") as f:
              json.dump(payload, f)
          EOF

      - name: Call Ollama via ngrok
        run: |
          curl -s https://budget-gracious-boozy.ngrok-free.dev/api/generate \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

      - name: Debug response
        run: cat response.json

      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let raw = fs.readFileSync('response.json', 'utf8');

            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              data = {
                response: "AI review failed: invalid response format from model."
              };
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI PR Review\n\n" + (data.response || "No response")
            });