name: AI PR Review (Ollama)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (trimmed)
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git -U20 diff origin/${{ github.event.pull_request.base.ref }}...HEAD \
          | head -c 12000 > diff.txt

      - name: Create payload
        run: |
          python3 - << 'EOF'
          import json

          diff = open("diff.txt", "r", errors="ignore").read()

          payload = {
              "model": "qwen3.5:35b",
              "stream": False,
              "options": {
                  "num_predict": 4096,
                  "temperature": 0.2
              },
              "prompt": (
                  "You are a senior software engineer reviewing a pull request.\n"
                  "Return ONLY a concise review.\n"
                  "NO thinking process.\n\n"
                  "Format:\n"
                  "- Bugs\n"
                  "- Security issues\n"
                  "- Performance issues\n"
                  "- Improvements\n"
                  "- Summary\n\n"
                  "If the diff is too large, focus only on the most important changes.\n\n"
                  "DIFF:\n"
              ) + diff
          }

          with open("payload.json", "w") as f:
              json.dump(payload, f)
          EOF

      - name: Call Ollama via ngrok
        run: |
          curl -s https://budget-gracious-boozy.ngrok-free.dev/api/generate \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

      - name: Debug response
        run: cat response.json

      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('response.json', 'utf8');
            let text = "";

            try {
              const data = JSON.parse(raw);
              
              if (data.response) {
                text = data.response;
              } else if (data.message && data.message.content) {
                text = data.message.content;
              } else if (data.done_reason === "length") {
                text = "❌ AI ran out of tokens while thinking. Increase `num_predict`.";
              } else {
                text = "❌ AI returned an empty response.";
              }
            } catch (e) {
              text = "❌ Failed to parse JSON. Raw output:\n\n```json\n" + raw + "\n```";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI PR Review\n\n" + text
            });