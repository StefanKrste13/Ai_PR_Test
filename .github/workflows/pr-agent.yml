name: AI PR Review (Ollama)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff (trimmed)
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD \
          | head -c 6000 > diff.txt

      - name: Create payload
        run: |
          python3 - << 'EOF'
          import json

          diff = open("diff.txt", "r", errors="ignore").read()

          payload = {
              "model": "qwen3.5:35b",
              "stream": False,
              "options": {
                  "num_predict": 1024,
                  "temperature": 0.2,
                  "num_ctx": 8192,
                  "stop": []
              },
              "prompt": (
                  "You are a senior software engineer reviewing a pull request.\n"
                  "You MUST always return a review.\n"
                  "Never return empty output.\n"
                  "Never think out loud.\n"
                  "Return ONLY markdown.\n\n"
                  "Format:\n"
                  "- Bugs\n"
                  "- Security issues\n"
                  "- Performance issues\n"
                  "- Improvements\n"
                  "- Summary\n\n"
                  "DIFF:\n"
              ) + diff
          }

          with open("payload.json", "w") as f:
              json.dump(payload, f)
          EOF

      - name: Call Ollama via ngrok
        run: |
          curl --fail --silent --show-error \
          https://budget-gracious-boozy.ngrok-free.dev/api/generate \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

      - name: Debug response
        run: cat response.json

      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const raw = fs.readFileSync('response.json', 'utf8');

            let text = "";

            try {
              const data = JSON.parse(raw);
              text = data.response || "";
            } catch (e) {
              text = raw;
            }

            text = text
              .replace(/<think>[\s\S]*?<\/think>/g, '')
              .replace(/thinking[\s\S]*/i, '')
              .trim();

            if (!text) {
              text = "❌ Empty AI response (model failed or truncated)";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI PR Review\n\n" + text
            });