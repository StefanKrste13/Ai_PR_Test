name: AI PR Review (Ollama)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

      - name: Create payload
        run: |
          python3 - << 'EOF'
          import json

          diff = open("diff.txt", "r", errors="ignore").read()

          payload = {
              "model": "qwen3.5:35b",
              "stream": False,
              "prompt": "Review this PR:\n\n" + diff
          }

          open("payload.json", "w").write(json.dumps(payload))
          EOF

      - name: Call Ollama via ngrok
        run: |
          curl -s https://budget-gracious-boozy.ngrok-free.dev/api/generate \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

      - name: Post comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('response.json', 'utf8'));

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## AI Review\n\n" + data.response
            });